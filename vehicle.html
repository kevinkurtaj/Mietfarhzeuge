<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Fahrzeug</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
    font-family: Arial;
    background: #f4f6f9;
    padding: 40px;
}

.card {
    background: white;
    padding: 25px;
    border-radius: 12px;
    max-width: 500px;
    margin: auto;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

input, textarea, select {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    margin-top: 15px;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #2d6cdf;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #1f4fa3;
}

.error {
    color: red;
    margin-top: 10px;
}
.success {
    color: green;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="card">
<h2>Schaden hinzufügen</h2>

<input id="title" placeholder="z.B. Kratzer">
<input id="location" placeholder="z.B. vorne">
<select id="severity">
    <option value="leicht">leicht</option>
    <option value="mittel">mittel</option>
    <option value="schwer">schwer</option>
</select>

<textarea id="description" placeholder="Beschreibung"></textarea>

<button onclick="saveDamage()">Schaden speichern</button>

<div id="msg"></div>
</div>

<script>

const SUPABASE_URL = "https://iufkwovepjjlycdulnwa.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1Zmt3b3ZlcGpsanljZHVsbndhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Mjc5MDQsImV4cCI6MjA5MjUwMzkwNH0.LucPsaYa2iNOzQmbn-7ECNxi-ATEj3_mrHvJfEvDfmY";

const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 🔥 Fahrzeug-ID holen
const params = new URLSearchParams(window.location.search);
const vehicleId = params.get("id");

// 🔥 aktueller User
async function getCurrentUser() {
    const { data } = await db.auth.getUser();
    return data.user;
}

// 🔥 Mitarbeiter anhand Email holen
async function getEmployee(user) {
    if (!user) return null;

    const { data } = await db
        .from("employees")
        .select("*")
        .eq("email", user.email)
        .single();

    return data;
}

// 🔥 Schaden speichern
async function saveDamage() {

    const msg = document.getElementById("msg");
    msg.innerHTML = "";

    const user = await getCurrentUser();

    if (!user) {
        msg.innerHTML = "<div class='error'>Nicht eingeloggt</div>";
        return;
    }

    const employee = await getEmployee(user);

    const title = document.getElementById("title").value;
    const location = document.getElementById("location").value;
    const severity = document.getElementById("severity").value;
    const description = document.getElementById("description").value;

    const { error } = await db.from("damages").insert({
        vehicle_id: vehicleId,
        title: title,
        location: location,
        severity: severity,
        description: description,
        user_id: user.id,          // 🔥 FIX (UUID!)
        employee_id: employee?.id  // 🔥 Mitarbeiter
    });

    if (error) {
        msg.innerHTML = "<div class='error'>" + error.message + "</div>";
        return;
    }

    // 🔥 History log
    await db.from("damage_history").insert({
        damage_id: null,
        action_text: "Schaden gemeldet",
        user_id: user.id,
        details: title + " (" + location + ")"
    });

    msg.innerHTML = "<div class='success'>Gespeichert</div>";
}

</script>

</body>
</html>
