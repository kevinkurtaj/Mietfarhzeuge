<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fahrzeug</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;background:#f4f6f8;margin:0}
header{background:white;padding:20px;border-bottom:1px solid #ddd}
main{padding:20px}
button{padding:10px 14px;border:none;border-radius:10px;cursor:pointer}
.action{background:#111;color:white}
.secondary{background:#ddd}
.panel{background:white;padding:20px;border-radius:15px;margin-bottom:20px}
</style>
</head>

<body>

<header>
<h2 id="vehicleTitle">Lädt...</h2>
</header>

<main>

<div class="panel">
<button class="action" onclick="openVehicleStatusForm()">Fahrzeugstatus ändern</button>
</div>

<div class="panel" id="vehicleInfo"></div>

<div class="panel" id="damageDetails">Auswahl...</div>

</main>

<script>

// 🔥 DEINE DATEN
const SUPABASE_URL = "https://iufkwovepjljycdulnwa.supabase.co/";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1Zmt3b3ZlcGpsanljZHVsbndhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Mjc5MDQsImV4cCI6MjA5MjUwMzkwNH0.LucPsaYa2iNOzQmbn-7ECNxi-ATEj3_mrHvJfEvDfmY";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const params = new URLSearchParams(window.location.search);
const vehicleId = params.get("id");

let employees = {};
const info = document.getElementById("vehicleInfo");
const title = document.getElementById("vehicleTitle");
const details = document.getElementById("damageDetails");

// ------------------ LOAD ------------------

async function loadEmployees(){
const {data} = await supabase.from("employees").select("*");
employees = Object.fromEntries(data.map(e=>[e.id,e.name]));
}

async function loadVehicle(){
const {data} = await supabase.from("vehicles").select("*").eq("id",vehicleId).single();

title.textContent = data.name + " - " + data.kennzeichen;

info.innerHTML = `
<b>Status:</b> ${data.status}<br>
<b>Reserve:</b> ${data.is_reserve ? "Ja":"Nein"}
`;
}

// ------------------ STATUS FORM ------------------

function openVehicleStatusForm(){
details.innerHTML = `
<h3>Status ändern</h3>

<select id="status">
<option value="einsatzbereit">einsatzbereit</option>
<option value="nicht_einsatzbereit">nicht einsatzbereit</option>
<option value="werkstatt">Werkstatt</option>
<option value="nicht_im_einsatz">nicht im Einsatz</option>
<option value="abruf">Abruf / Reserve</option>
</select>

<br><br>

<select id="user">
${Object.entries(employees).map(([id,n])=>`<option value="${id}">${n}</option>`).join("")}
</select>

<br><br>

<textarea id="note" placeholder="Notiz"></textarea>

<br><br>

<button class="action" onclick="saveStatus()">Speichern</button>
<button class="secondary" onclick="details.innerHTML='Auswahl...'">Abbrechen</button>

<div id="msg"></div>
`;
}

// ------------------ SAVE ------------------

async function saveStatus(){
const status = document.getElementById("status").value;
const user = document.getElementById("user").value;
const note = document.getElementById("note").value;
const msg = document.getElementById("msg");

msg.innerHTML="speichert...";

const {error} = await supabase
.from("vehicles")
.update({status})
.eq("id",vehicleId);

if(error){
msg.innerHTML="Fehler!";
return;
}

// HISTORY
await supabase.from("vehicle_history").insert([{
vehicle_id: vehicleId,
action: "status_geaendert",
user_id: user,
details: status + " | " + note
}]);

msg.innerHTML="Gespeichert";

loadVehicle();
}

// ------------------ INIT ------------------

async function init(){
await loadEmployees();
await loadVehicle();
}

init();

</script>

</body>
</html>
