<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Passwort zurücksetzen</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="icon" href="data:,">
<style>
* { box-sizing: border-box; font-family: Arial, Helvetica, sans-serif; }
body {
  margin:0; min-height:100vh;
  background: radial-gradient(circle at top right, #2563eb 0%, #172554 35%, #020617 100%);
  display:flex; align-items:center; justify-content:center; color:#111827; padding:20px;
}
.card {
  width:100%; max-width:460px; background:rgba(255,255,255,.96);
  border:1px solid rgba(255,255,255,.35); border-radius:30px; padding:36px;
  box-shadow:0 30px 90px rgba(0,0,0,.42);
}
.logo {
  width:58px; height:58px; border-radius:18px; background:#111827; color:white;
  display:flex; align-items:center; justify-content:center; font-size:28px; margin-bottom:18px;
}
h1 { margin:0; font-size:29px; }
.subtitle { margin:8px 0 22px; color:#6b7280; font-size:14px; line-height:1.45; }
.user-box {
  background:#f8fafc; border:1px solid #e5e7eb; padding:13px; border-radius:16px;
  margin-bottom:18px; font-size:14px; color:#374151;
}
label { font-weight:800; font-size:13px; margin-bottom:6px; display:block; }
input {
  width:100%; padding:14px; margin-bottom:12px; border-radius:15px;
  border:1px solid #d1d5db; font-size:15px; outline:none;
}
input:focus { border-color:#2563eb; box-shadow:0 0 0 4px rgba(37,99,235,.16); }
.strength-bar { height:9px; background:#e5e7eb; border-radius:999px; overflow:hidden; margin-bottom:7px; }
#strengthFill { height:100%; width:0%; transition:.25s; background:#e5e7eb; }
#strengthText { font-size:12px; color:#6b7280; margin-bottom:14px; }
button {
  width:100%; padding:14px; border:none; background:#111827; color:white;
  border-radius:15px; font-weight:900; font-size:15px; cursor:pointer; margin-top:4px;
}
button:hover { background:#1f2937; }
button:disabled { opacity:.55; cursor:not-allowed; }
.msg { margin-top:14px; padding:12px; border-radius:13px; font-size:14px; display:none; }
.error { background:#fef2f2; color:#991b1b; border:1px solid #fecaca; }
.success { background:#ecfdf5; color:#166534; border:1px solid #bbf7d0; }
.note { margin-top:18px; font-size:12px; color:#6b7280; text-align:center; line-height:1.35; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🔐</div>
  <h1>Passwort zurücksetzen</h1>
  <div class="subtitle">Vergib ein neues Passwort für deinen Zugang zur Schadendokumentation.</div>

  <div class="user-box" id="userBox">Reset-Link wird geprüft ...</div>

  <label>Neues Passwort</label>
  <input type="password" id="pw1" placeholder="Neues Passwort eingeben">

  <div class="strength-bar"><div id="strengthFill"></div></div>
  <div id="strengthText">Passwortstärke: -</div>

  <label>Passwort wiederholen</label>
  <input type="password" id="pw2" placeholder="Passwort erneut eingeben">

  <button id="saveBtn" onclick="resetPassword()">Passwort speichern</button>
  <div id="msg" class="msg"></div>

  <div class="note">Nach erfolgreicher Änderung wirst du automatisch zur Anmeldung weitergeleitet.</div>
</div>

<script>
const SUPABASE_URL = "https://iufkwovepjljycdulnwa.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1Zmt3b3ZlcGpsanljZHVsbndhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Mjc5MDQsImV4cCI6MjA5MjUwMzkwNH0.LucPsaYa2iNOzQmbn-7ECNxi-ATEj3_mrHvJfEvDfmY";
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const msg = document.getElementById("msg");
const saveBtn = document.getElementById("saveBtn");
const userBox = document.getElementById("userBox");
const pw1Input = document.getElementById("pw1");
const strengthFill = document.getElementById("strengthFill");
const strengthText = document.getElementById("strengthText");

let currentUser = null;

function showMessage(text, type) {
  msg.textContent = text;
  msg.className = "msg " + type;
  msg.style.display = "block";
}

function checkStrength(password) {
  let score = 0;
  if (password.length >= 6) score++;
  if (password.length >= 10) score++;
  if (/[A-Z]/.test(password)) score++;
  if (/[0-9]/.test(password)) score++;
  if (/[^A-Za-z0-9]/.test(password)) score++;

  if (!password) {
    strengthFill.style.width = "0%";
    strengthFill.style.background = "#e5e7eb";
    strengthText.textContent = "Passwortstärke: -";
    return 0;
  }

  if (score <= 2) {
    strengthFill.style.width = "35%";
    strengthFill.style.background = "#dc2626";
    strengthText.textContent = "Passwortstärke: schwach";
  } else if (score <= 4) {
    strengthFill.style.width = "70%";
    strengthFill.style.background = "#f59e0b";
    strengthText.textContent = "Passwortstärke: mittel";
  } else {
    strengthFill.style.width = "100%";
    strengthFill.style.background = "#16a34a";
    strengthText.textContent = "Passwortstärke: stark";
  }

  return score;
}

pw1Input.addEventListener("input", () => checkStrength(pw1Input.value));

async function logActivity(status, details) {
  try {
    await supabaseClient.from("password_reset_activity").insert([{
      user_id: currentUser?.id || null,
      email: currentUser?.email || null,
      status,
      details
    }]);
  } catch (e) {
    console.warn("Activity Log nicht gespeichert:", e);
  }
}

async function establishResetSession() {
  const hash = window.location.hash || "";
  const hashParams = new URLSearchParams(hash.startsWith("#") ? hash.substring(1) : hash);

  const access_token = hashParams.get("access_token");
  const refresh_token = hashParams.get("refresh_token");
  const type = hashParams.get("type");

  if (access_token && refresh_token) {
    const { error } = await supabaseClient.auth.setSession({ access_token, refresh_token });
    if (error) throw error;

    // URL säubern, damit der Token nicht sichtbar bleibt
    window.history.replaceState(null, "", window.location.pathname);
  }

  const { data, error } = await supabaseClient.auth.getUser();

  if (error || !data.user) {
    throw new Error("Reset-Link ungültig oder abgelaufen.");
  }

  currentUser = data.user;
  return { user: data.user, type };
}

window.onload = async () => {
  try {
    const { user } = await establishResetSession();
    userBox.innerHTML = `👤 Benutzer:<br><strong>${user.email}</strong>`;
    await logActivity("reset_page_opened", "Passwort-Reset-Seite wurde geöffnet");
  } catch (error) {
    userBox.innerHTML = "❌ Reset-Link ungültig oder abgelaufen.";
    showMessage("Bitte fordere einen neuen Passwort-Reset-Link an.", "error");
    saveBtn.disabled = true;
  }
};

async function resetPassword() {
  const pw1 = document.getElementById("pw1").value;
  const pw2 = document.getElementById("pw2").value;

  msg.style.display = "none";

  if (!pw1 || !pw2) {
    showMessage("Bitte beide Passwortfelder ausfüllen.", "error");
    return;
  }

  if (pw1.length < 6) {
    showMessage("Das Passwort muss mindestens 6 Zeichen haben.", "error");
    return;
  }

  if (pw1 !== pw2) {
    showMessage("Die Passwörter stimmen nicht überein.", "error");
    return;
  }

  if (checkStrength(pw1) < 3) {
    showMessage("Bitte ein stärkeres Passwort wählen.", "error");
    return;
  }

  saveBtn.disabled = true;
  saveBtn.textContent = "Wird gespeichert ...";

  const { error } = await supabaseClient.auth.updateUser({ password: pw1 });

  if (error) {
    saveBtn.disabled = false;
    saveBtn.textContent = "Passwort speichern";
    showMessage("Fehler: " + error.message, "error");
    await logActivity("reset_failed", error.message);
    return;
  }

  await logActivity("reset_success", "Passwort erfolgreich geändert");
  showMessage("Passwort erfolgreich geändert ✅ Weiterleitung in 3 Sekunden ...", "success");

  setTimeout(async () => {
    await supabaseClient.auth.signOut();
    window.location.href = "/Mietfahrzeuge/index.html";
  }, 3000);
}
</script>
</body>
</html>
