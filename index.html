<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fahrzeuge</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; margin:0; background:#f4f6f8; }

header {
  background:white;
  padding:15px;
  border-bottom:1px solid #ddd;
  display:flex;
  justify-content:space-between;
}

main { padding:20px; max-width:900px; margin:auto; }

.card {
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
<div>🚗 Fahrzeuge</div>
<button onclick="logout()">Logout</button>
</header>

<main>

<!-- LOGIN -->
<div id="loginBox">
<h2>Login</h2>
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Passwort"><br>
<button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" style="display:none">
<div id="vehicleList"></div>
</div>

</main>

<script>
const supabase = window.supabase.createClient(
"https://iufkwovepjljycdulnwa.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1Zmt3b3ZlcGpsanljZHVsbndhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Mjc5MDQsImV4cCI6MjA5MjUwMzkwNH0.LucPsaYa2iNOzQmbn-7ECNxi-ATEj3_mrHvJfEvDfmY"
);

// LOGIN
async function login(){
const { error } = await supabase.auth.signInWithPassword({
email: document.getElementById("email").value,
password: document.getElementById("password").value
});

if(error) return alert("Login Fehler");

startApp();
}

// LOGOUT
async function logout(){
await supabase.auth.signOut();
location.reload();
}

// CHECK LOGIN
async function checkUser(){
const { data } = await supabase.auth.getSession();
if(data.session) startApp();
}

// START
function startApp(){
document.getElementById("loginBox").style.display="none";
document.getElementById("app").style.display="block";
loadVehicles();
}

// LOAD VEHICLES
async function loadVehicles(){
const { data } = await supabase
.from("vehicles")
.select("*");

document.getElementById("vehicleList").innerHTML = data.map(v=>`
<div class="card" onclick="openVehicle(${v.id})">
<b>${v.name}</b><br>
${v.kennzeichen}
</div>
`).join("");
}

function openVehicle(id){
location.href = "vehicle.html?id=" + id;
}

checkUser();
</script>

</body>
</html>
