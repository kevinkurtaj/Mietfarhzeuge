<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schadendokumentation Mietfahrzeuge</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="icon" href="data:,">
<style>
* {
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body {
  margin: 0;
  min-height: 100vh;
  background:
    radial-gradient(circle at top right, rgba(37,99,235,0.20), transparent 35%),
    linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
  color: #111827;
}

header {
  background: rgba(255,255,255,0.88);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid #e5e7eb;
  padding: 18px 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 10px 30px rgba(15,23,42,0.06);
}

.brand {
  font-size: 21px;
  font-weight: 900;
  letter-spacing: -0.3px;
}

.header-actions {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}

.user-info {
  display: none;
  font-size: 13px;
  color: #475569;
  background: #f1f5f9;
  padding: 9px 12px;
  border-radius: 999px;
}

.btn {
  border: none;
  background: #111827;
  color: white;
  padding: 10px 15px;
  border-radius: 12px;
  font-weight: 800;
  cursor: pointer;
  text-decoration: none;
  display: none;
}

.btn.secondary {
  background: #e5e7eb;
  color: #111827;
}

main {
  padding: 34px;
  max-width: 1150px;
  margin: auto;
}

#loginBox {
  width: 100%;
  max-width: 420px;
  margin: 105px auto 0;
  background: rgba(255,255,255,0.95);
  padding: 38px;
  border-radius: 28px;
  box-shadow: 0 28px 80px rgba(15,23,42,0.16);
  border: 1px solid rgba(255,255,255,0.65);
}

.login-icon {
  width: 56px;
  height: 56px;
  border-radius: 18px;
  background: #111827;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 18px;
}

#loginBox h2 {
  margin: 0;
  font-size: 30px;
  letter-spacing: -0.5px;
}

.login-subtitle {
  font-size: 14px;
  color: #64748b;
  margin: 8px 0 24px;
  line-height: 1.45;
}

#loginBox input {
  width: 100%;
  padding: 14px 15px;
  margin-bottom: 12px;
  border: 1px solid #cbd5e1;
  border-radius: 15px;
  font-size: 15px;
  outline: none;
  background: #f8fafc;
}

#loginBox input:focus {
  border-color: #2563eb;
  box-shadow: 0 0 0 4px rgba(37,99,235,0.14);
  background: white;
}

#loginBox button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 15px;
  background: #111827;
  color: white;
  font-weight: 900;
  cursor: pointer;
  font-size: 15px;
}

#loginBox button:hover {
  background: #1f2937;
}

#loginMessage {
  margin-top: 13px;
  font-size: 14px;
  color: #991b1b;
}

#app {
  display: none;
}

.page-title {
  margin-bottom: 24px;
}

.page-title h1 {
  margin: 0;
  font-size: 34px;
  letter-spacing: -0.7px;
}

.page-title p {
  margin: 7px 0 0;
  color: #64748b;
}

#vehicleList {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 18px;
}

.card {
  background: rgba(255,255,255,0.94);
  padding: 22px;
  border-radius: 24px;
  border: 1px solid #e5e7eb;
  cursor: pointer;
  box-shadow: 0 14px 34px rgba(15,23,42,0.08);
  transition: 0.18s ease;
}

.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 22px 44px rgba(15,23,42,0.13);
}

.card-title {
  font-size: 19px;
  font-weight: 900;
  margin-bottom: 6px;
}

.kennzeichen {
  color: #475569;
  margin-bottom: 13px;
}

.status {
  display: inline-block;
  padding: 7px 11px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 900;
  background: #f1f5f9;
  color: #475569;
}

.einsatzbereit { background:#dcfce7; color:#166534; }
.werkstatt, .nicht_einsatzbereit { background:#fee2e2; color:#991b1b; }
.nicht_im_einsatz { background:#e5e7eb; color:#374151; }
.abruf { background:#dbeafe; color:#1d4ed8; }

.open-link {
  margin-top: 16px;
  color: #2563eb;
  font-weight: 900;
  font-size: 14px;
}

.loading, .error {
  background: white;
  padding: 18px;
  border-radius: 16px;
  border: 1px solid #e5e7eb;
}

.error {
  color: #991b1b;
  background: #fef2f2;
}

@media(max-width:700px) {
  header { align-items:flex-start; flex-direction:column; gap:12px; }
  main { padding:20px; }
  #loginBox { margin-top:50px; }
}
</style>
</head>

<body>
<header>
  <div class="brand">🚐 Schadendokumentation Mietfahrzeuge</div>
  <div class="header-actions">
    <div id="userInfo" class="user-info"></div>
    <a id="adminBtn" class="btn secondary" href="admin.html">Admin Panel</a>
    <button id="logoutBtn" class="btn" onclick="logout()">Logout</button>
  </div>
</header>

<main>
  <div id="loginBox">
    <div class="login-icon">🔐</div>
    <h2>Anmeldung</h2>
    <div class="login-subtitle">Bitte mit deinem Zugang anmelden. Du kannst auch einfach Enter drücken.</div>

    <input id="email" type="email" placeholder="E-Mail-Adresse" autocomplete="email">
    <input id="password" type="password" placeholder="Passwort" autocomplete="current-password">

    <button onclick="login()">Einloggen</button>
    <div id="loginMessage"></div>
  </div>

  <div id="app">
    <div class="page-title">
      <h1>Fahrzeugübersicht</h1>
      <p>Übersicht aller Inhofer-Sprinter und Reservefahrzeuge</p>
    </div>

    <div id="vehicleList" class="loading">Fahrzeuge werden geladen ...</div>
  </div>
</main>

<script>
const SUPABASE_URL = "https://iufkwovepjljycdulnwa.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1Zmt3b3ZlcGpsanljZHVsbndhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Mjc5MDQsImV4cCI6MjA5MjUwMzkwNH0.LucPsaYa2iNOzQmbn-7ECNxi-ATEj3_mrHvJfEvDfmY";
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const ADMIN_EMAILS = [
  "kevin.kurtaj@moebel-inhofer.de",
  "kevinkurtaj@gmx.de"
];

const loginBox = document.getElementById("loginBox");
const app = document.getElementById("app");
const vehicleList = document.getElementById("vehicleList");
const logoutBtn = document.getElementById("logoutBtn");
const adminBtn = document.getElementById("adminBtn");
const loginMessage = document.getElementById("loginMessage");
const userInfo = document.getElementById("userInfo");

document.getElementById("email").addEventListener("keydown", function(event) {
  if (event.key === "Enter") login();
});

document.getElementById("password").addEventListener("keydown", function(event) {
  if (event.key === "Enter") login();
});

function formatVehicleStatus(status) {
  switch (status) {
    case "einsatzbereit": return "einsatzbereit";
    case "schaeden_vorhanden": return "Schäden vorhanden";
    case "werkstatt": return "Werkstatt";
    case "nicht_einsatzbereit": return "nicht einsatzbereit";
    case "nicht_im_einsatz": return "nicht im Einsatz";
    case "abruf": return "Abruf / Reserve";
    default: return status || "unbekannt";
  }
}

async function login() {
  loginMessage.textContent = "";

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  if (!email || !password) {
    loginMessage.textContent = "Bitte E-Mail und Passwort eingeben.";
    return;
  }

  const { error } = await supabaseClient.auth.signInWithPassword({ email, password });

  if (error) {
    loginMessage.textContent = "Login fehlgeschlagen. Bitte Zugangsdaten prüfen.";
    return;
  }

  startApp();
}

async function logout() {
  await supabaseClient.auth.signOut();
  location.reload();
}

async function checkUser() {
  const { data } = await supabaseClient.auth.getSession();

  if (data.session) {
    startApp();
  } else {
    loginBox.style.display = "block";
    app.style.display = "none";
    logoutBtn.style.display = "none";
    adminBtn.style.display = "none";
    userInfo.style.display = "none";
  }
}

async function startApp() {
  const { data } = await supabaseClient.auth.getSession();
  const email = data.session?.user?.email || "";

  loginBox.style.display = "none";
  app.style.display = "block";
  logoutBtn.style.display = "inline-block";
  userInfo.style.display = "block";
  userInfo.textContent = email;
  adminBtn.style.display = ADMIN_EMAILS.includes(email) ? "inline-block" : "none";

  loadVehicles();
}

async function loadVehicles() {
  vehicleList.className = "loading";
  vehicleList.innerHTML = "Fahrzeuge werden geladen ...";

  const { data, error } = await supabaseClient
    .from("vehicles")
    .select("*")
    .order("id", { ascending: true });

  if (error) {
    vehicleList.className = "error";
    vehicleList.innerHTML = "Fahrzeuge konnten nicht geladen werden: " + error.message;
    return;
  }

  if (!data || data.length === 0) {
    vehicleList.className = "error";
    vehicleList.innerHTML = "Keine Fahrzeuge gefunden.";
    return;
  }

  vehicleList.className = "";

  vehicleList.innerHTML = data.map(vehicle => {
    const status = vehicle.status || "";
    return `
      <div class="card" onclick="openVehicle(${vehicle.id})">
        <div class="card-title">${vehicle.name || "Fahrzeug"}</div>
        <div class="kennzeichen">${vehicle.kennzeichen || "-"}</div>
        <div class="status ${status}">${formatVehicleStatus(status)}</div>
        ${vehicle.is_reserve ? `<div style="margin-top:8px;font-size:13px;color:#64748b;">Reservefahrzeug</div>` : ""}
        <div class="open-link">Öffnen →</div>
      </div>
    `;
  }).join("");
}

function openVehicle(id) {
  location.href = "vehicle.html?id=" + id;
}

checkUser();
</script>
</body>
</html>
