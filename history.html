<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fahrzeughistorie</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
    font-family: Arial;
    background: #f4f6f9;
    margin: 0;
}

header {
    background: #111827;
    color: white;
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
}

.container {
    padding: 20px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 10px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}

input, select {
    padding: 10px;
    margin: 5px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.tag {
    background: #3b82f6;
    color: white;
    padding: 3px 8px;
    border-radius: 6px;
    font-size: 12px;
}
</style>
</head>

<body>

<header>
    <div>📜 Fahrzeughistorie</div>
    <div>
        <a href="index.html" style="color:white;">Zurück</a>
    </div>
</header>

<div class="container">

    <input id="search" placeholder="Suche...">
    
    <select id="filter">
        <option value="all">Alle</option>
        <option value="created">Schaden erstellt</option>
        <option value="repaired">Repariert</option>
    </select>

    <div id="historyList"></div>

</div>

<script>
const SUPABASE_URL = "https://iufkwovepjljycdulnwa.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1Zmt3b3ZlcGpsanljZHVsbndhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Mjc5MDQsImV4cCI6MjA5MjUwMzkwNH0.LucPsaYa2iNOzQmbn-7ECNxi-ATEj3_mrHvJfEvDfmY";

const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const list = document.getElementById("historyList");
const search = document.getElementById("search");
const filter = document.getElementById("filter");

let data = [];

async function loadHistory() {

    const { data: history, error } = await db
        .from("damage_history")
        .select(`
            id,
            action,
            created_at,
            details,
            user_id,
            damages (
                id,
                type,
                location
            )
        `)
        .order("created_at", { ascending: false });

    if (error) {
        console.error(error);
        alert("Fehler beim Laden");
        return;
    }

    data = history;
    render();
}

function render() {
    const s = search.value.toLowerCase();
    const f = filter.value;

    list.innerHTML = "";

    data
    .filter(item => {
        const matchSearch = item.details?.toLowerCase().includes(s);
        const matchFilter = f === "all" || item.action === f;
        return matchSearch && matchFilter;
    })
    .forEach(item => {

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <b>${item.action}</b> 
            <span class="tag">${item.damages?.type || "-"}</span><br>
            📍 ${item.damages?.location || "-"}<br>
            👤 User ID: ${item.user_id || "-"}<br>
            📝 ${item.details || ""}<br>
            🕒 ${new Date(item.created_at).toLocaleString()}
        `;

        list.appendChild(div);
    });
}

search.oninput = render;
filter.onchange = render;

loadHistory();
</script>

</body>
</html>
