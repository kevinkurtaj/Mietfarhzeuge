<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fahrzeughistorie</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="icon" href="data:,">

<style>
* {
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body {
  margin: 0;
  background:
    radial-gradient(circle at top right, rgba(37,99,235,.16), transparent 35%),
    linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
  color: #111827;
  min-height: 100vh;
}

header {
  background: rgba(255,255,255,.92);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid #e5e7eb;
  padding: 18px 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 10px 30px rgba(15,23,42,.06);
}

header a {
  color: #111827;
  text-decoration: none;
  font-weight: 900;
  background: #e5e7eb;
  padding: 10px 14px;
  border-radius: 12px;
}

.header-title {
  font-weight: 900;
  font-size: 20px;
}

main {
  max-width: 1050px;
  margin: auto;
  padding: 32px;
}

.hero {
  margin-bottom: 22px;
}

.hero h1 {
  margin: 0;
  font-size: 34px;
  letter-spacing: -0.7px;
}

.hero p {
  margin: 8px 0 0;
  color: #64748b;
}

.toolbar {
  display: grid;
  grid-template-columns: 1fr 220px;
  gap: 12px;
  margin-bottom: 18px;
}

input, select {
  width: 100%;
  padding: 13px 14px;
  border-radius: 14px;
  border: 1px solid #cbd5e1;
  outline: none;
  background: white;
}

input:focus, select:focus {
  border-color: #2563eb;
  box-shadow: 0 0 0 4px rgba(37,99,235,.14);
}

.card {
  background: rgba(255,255,255,.96);
  border: 1px solid #e5e7eb;
  border-radius: 22px;
  padding: 18px;
  margin-bottom: 12px;
  box-shadow: 0 14px 34px rgba(15,23,42,.07);
  cursor: pointer;
  transition: .18s ease;
}

.card:hover {
  transform: translateY(-2px);
  box-shadow: 0 18px 42px rgba(15,23,42,.11);
}

.tag {
  display: inline-block;
  border-radius: 999px;
  padding: 6px 10px;
  font-size: 12px;
  font-weight: 900;
  margin-bottom: 8px;
}

.vehicle { background: #dbeafe; color: #1d4ed8; }
.damage { background: #fee2e2; color: #991b1b; }
.success { background: #dcfce7; color: #166534; }
.warning { background: #fef3c7; color: #92400e; }

.time {
  color: #64748b;
  font-size: 13px;
  margin-bottom: 6px;
}

.details {
  color: #334155;
}

.empty, .error {
  background: white;
  padding: 18px;
  border-radius: 16px;
  border: 1px solid #e5e7eb;
}

.error {
  color: #991b1b;
  background: #fef2f2;
}

.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.45);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
  z-index: 50;
}

.modal-box {
  width: 100%;
  max-width: 480px;
  background: white;
  border-radius: 24px;
  padding: 24px;
  box-shadow: 0 30px 90px rgba(0,0,0,.28);
}

.modal-box h2 {
  margin: 0 0 16px;
}

.modal-row {
  margin-bottom: 10px;
  font-size: 14px;
}

.close-btn {
  width: 100%;
  margin-top: 14px;
  padding: 12px;
  border: none;
  background: #111827;
  color: white;
  border-radius: 12px;
  font-weight: 900;
  cursor: pointer;
}

@media(max-width:750px) {
  header {
    flex-direction: column;
    align-items: flex-start;
    gap: 12px;
  }

  main {
    padding: 20px;
  }

  .toolbar {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<header>
  <a id="backLink" href="index.html">← Zurück</a>
  <div class="header-title">Fahrzeughistorie</div>
</header>

<main>
  <div class="hero">
    <h1>Historie</h1>
    <p>Alle Fahrzeugstatus-Änderungen und Schadensereignisse.</p>
  </div>

  <div class="toolbar">
    <input id="search" placeholder="Suche nach Details, Aktion, Mitarbeiter ...">
    <select id="filter">
      <option value="all">Alle Einträge</option>
      <option value="vehicle">Nur Fahrzeugstatus</option>
      <option value="damage">Nur Schäden</option>
    </select>
  </div>

  <div id="historyApp" class="empty">Historie wird geladen ...</div>
</main>

<div id="modal" class="modal">
  <div class="modal-box">
    <div id="modalContent"></div>
    <button class="close-btn" onclick="closeModal()">Schließen</button>
  </div>
</div>

<script>
const SUPABASE_URL = "https://iufkwovepjljycdulnwa.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1Zmt3b3ZlcGpsanljZHVsbndhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Mjc5MDQsImV4cCI6MjA5MjUwMzkwNH0.LucPsaYa2iNOzQmbn-7ECNxi-ATEj3_mrHvJfEvDfmY";

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const params = new URLSearchParams(window.location.search);
const vehicleId = params.get("id");

const historyApp = document.getElementById("historyApp");
const searchInput = document.getElementById("search");
const filterSelect = document.getElementById("filter");
const backLink = document.getElementById("backLink");

let allData = [];
let employeesMap = {};
let vehicleName = "";

if (vehicleId) {
  backLink.href = "vehicle.html?id=" + vehicleId;
}

function formatDate(value) {
  if (!value) return "-";
  return new Date(value).toLocaleString("de-DE");
}

function formatAction(action) {
  switch (action) {
    case "fahrzeugstatus_geaendert": return "Fahrzeugstatus geändert";
    case "status_geaendert": return "Fahrzeugstatus geändert";
    case "angelegt": return "Schaden angelegt";
    case "bilder_hochgeladen": return "Bilder hochgeladen";
    case "repariert": return "Schaden repariert";
    case "irrtuemlich": return "Schaden irrtümlich";
    case "bearbeitet": return "Schaden bearbeitet";
    default: return action || "-";
  }
}

function employeeName(id) {
  return employeesMap[id] || "Unbekannt";
}

function getTag(item) {
  if (item.type === "vehicle") {
    return { css: "vehicle", text: "🚗 Fahrzeug" };
  }

  if (item.action === "repariert") {
    return { css: "success", text: "✅ Schaden" };
  }

  if (item.action === "irrtuemlich") {
    return { css: "warning", text: "⚠️ Schaden" };
  }

  return { css: "damage", text: "⚠️ Schaden" };
}

async function loadEmployees() {
  const { data } = await supabaseClient
    .from("employees")
    .select("id, name, email");

  employeesMap = {};
  (data || []).forEach(e => {
    employeesMap[e.id] = e.name || e.email || ("Mitarbeiter " + e.id);
  });
}

async function loadVehicleName() {
  const { data } = await supabaseClient
    .from("vehicles")
    .select("*")
    .eq("id", Number(vehicleId))
    .maybeSingle();

  if (data) {
    vehicleName = (data.name || "Fahrzeug") + (data.kennzeichen ? " — " + data.kennzeichen : "");
    document.querySelector(".hero p").textContent = "Historie für " + vehicleName;
  }
}

async function loadHistory() {
  if (!vehicleId) {
    historyApp.className = "error";
    historyApp.innerHTML = "Keine Fahrzeug-ID gefunden.";
    return;
  }

  await loadEmployees();
  await loadVehicleName();

  const { data: vehicleHistory, error: vehicleHistoryError } = await supabaseClient
    .from("vehicle_history")
    .select("*")
    .eq("vehicle_id", Number(vehicleId));

  if (vehicleHistoryError) {
    historyApp.className = "error";
    historyApp.innerHTML = "Fehler bei vehicle_history: " + vehicleHistoryError.message;
    return;
  }

  const { data: damages, error: damagesError } = await supabaseClient
    .from("damages")
    .select("*")
    .eq("vehicle_id", Number(vehicleId));

  if (damagesError) {
    historyApp.className = "error";
    historyApp.innerHTML = "Fehler bei damages: " + damagesError.message;
    return;
  }

  const damageIds = (damages || []).map(d => d.id);
  const damagesMap = {};
  (damages || []).forEach(d => {
    damagesMap[d.id] = d;
  });

  let damageHistory = [];

  if (damageIds.length > 0) {
    const { data: damageHistoryData, error: damageHistoryError } = await supabaseClient
      .from("damage_history")
      .select("*")
      .in("damage_id", damageIds);

    if (damageHistoryError) {
      historyApp.className = "error";
      historyApp.innerHTML = "Fehler bei damage_history: " + damageHistoryError.message;
      return;
    }

    damageHistory = damageHistoryData || [];
  }

  allData = [
    ...(vehicleHistory || []).map(item => ({
      ...item,
      type: "vehicle",
      display_title: "Fahrzeugstatus",
      employee_name: employeeName(item.user_id)
    })),
    ...(damageHistory || []).map(item => {
      const dmg = damagesMap[item.damage_id] || {};
      return {
        ...item,
        type: "damage",
        display_title: [
          dmg.damage_type || "Schaden",
          dmg.area || "",
          dmg.severity || ""
        ].filter(Boolean).join(" / "),
        employee_name: employeeName(item.user_id)
      };
    })
  ];

  allData.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

  if (allData.length === 0) {
    historyApp.className = "empty";
    historyApp.innerHTML =
      "Keine Historie gefunden.<br><br>" +
      "Fahrzeug-ID: " + vehicleId + "<br>" +
      "Gefundene Schäden: " + damageIds.length + "<br>" +
      "Fahrzeugstatus-Einträge: " + (vehicleHistory || []).length;
    return;
  }

  render();
}

function render() {
  const search = searchInput.value.toLowerCase().trim();
  const filter = filterSelect.value;

  const data = allData.filter(item => {
    const searchable = [
      item.type,
      item.action,
      item.details,
      item.display_title,
      item.employee_name,
      item.damage_id,
      item.vehicle_id
    ].join(" ").toLowerCase();

    const matchesSearch = !search || searchable.includes(search);
    const matchesFilter = filter === "all" || item.type === filter;

    return matchesSearch && matchesFilter;
  });

  if (data.length === 0) {
    historyApp.className = "empty";
    historyApp.innerHTML = "Keine passenden Einträge gefunden.";
    return;
  }

  historyApp.className = "";

  historyApp.innerHTML = data.map(item => {
    const tag = getTag(item);
    const index = allData.indexOf(item);

    return `
      <div class="card" onclick="openModal(${index})">
        <div class="tag ${tag.css}">
          ${tag.text} • ${formatAction(item.action)}
        </div>
        <div><strong>${item.display_title || "-"}</strong></div>
        <div class="time">${formatDate(item.created_at)} · ${item.employee_name}</div>
        <div class="details">${item.details || "-"}</div>
      </div>
    `;
  }).join("");
}

function openModal(index) {
  const item = allData[index];
  if (!item) return;

  document.getElementById("modalContent").innerHTML = `
    <h2>Detailansicht</h2>
    <div class="modal-row"><strong>Typ:</strong> ${item.type === "vehicle" ? "Fahrzeug" : "Schaden"}</div>
    <div class="modal-row"><strong>Aktion:</strong> ${formatAction(item.action)}</div>
    <div class="modal-row"><strong>Mitarbeiter:</strong> ${item.employee_name || "Unbekannt"}</div>
    <div class="modal-row"><strong>Zeitpunkt:</strong> ${formatDate(item.created_at)}</div>
    <div class="modal-row"><strong>Fahrzeug:</strong> ${vehicleName || "Fahrzeug-ID " + vehicleId}</div>
    ${item.damage_id ? `<div class="modal-row"><strong>Schaden-ID:</strong> ${item.damage_id}</div>` : ""}
    <div class="modal-row"><strong>Details:</strong><br>${item.details || "-"}</div>
  `;

  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

searchInput.addEventListener("input", render);
filterSelect.addEventListener("change", render);

loadHistory();
</script>

</body>
</html>
