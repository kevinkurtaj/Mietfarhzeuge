<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historie</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; margin:0; background:#f4f6f8; }

header {
  background:white;
  padding:15px;
  border-bottom:1px solid #ddd;
}

main { padding:20px; max-width:900px; margin:auto; }

.card {
  background:white;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
  cursor:pointer;
}

.tag { padding:4px 8px; border-radius:8px; font-size:12px; }
.vehicle { background:#dbeafe; color:#1d4ed8; }
.damage { background:#fee2e2; color:#991b1b; }

.modal {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-box {
  background:white;
  padding:20px;
  border-radius:16px;
  width:90%;
  max-width:400px;
}
</style>
</head>

<body>

<header>
<a href="index.html">← Zurück</a>
<h2>Historie</h2>
</header>

<main>

<input id="search" placeholder="Suche">

<div id="historyApp"></div>

</main>

<div id="modal" class="modal">
<div class="modal-box">
<div id="modalContent"></div>
<button onclick="closeModal()">Schließen</button>
</div>
</div>

<script>
const supabase = window.supabase.createClient(
"https://iufkwovepjljycdulnwa.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1Zmt3b3ZlcGpsanljZHVsbndhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Mjc5MDQsImV4cCI6MjA5MjUwMzkwNH0.LucPsaYa2iNOzQmbn-7ECNxi-ATEj3_mrHvJfEvDfmY"
);

let allData=[];

// LOAD
async function load(){

const vehicleId = new URLSearchParams(window.location.search).get("id");

const { data: vh } = await supabase.from("vehicle_history").select("*").eq("vehicle_id", vehicleId);
const { data: dmg } = await supabase.from("damages").select("id").eq("vehicle_id", vehicleId);

let dh=[];
if(dmg){
const ids=dmg.map(d=>d.id);
const res = await supabase.from("damage_history").select("*").in("damage_id", ids);
dh=res.data||[];
}

allData=[
...(vh||[]).map(i=>({...i,type:"vehicle"})),
...(dh||[]).map(i=>({...i,type:"damage"}))
];

render();
}

// RENDER
function render(){

const search=document.getElementById("search").value.toLowerCase();

let data = allData.filter(i=>{
return (!search || (i.details||"").toLowerCase().includes(search));
});

data.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));

document.getElementById("historyApp").innerHTML=data.map((item,i)=>{

let tag="vehicle", label="🚗 Fahrzeug";
if(item.type==="damage"){ tag="damage"; label="⚠️ Schaden"; }

return `
<div class="card" onclick="openModal(${i})">
<div class="tag ${tag}">${label} • ${item.action}</div>
<div>${new Date(item.created_at).toLocaleString()}</div>
<div>${item.details||""}</div>
</div>
`;

}).join("");
}

// MODAL
async function openModal(i){

const item=allData[i];

let name="Unbekannt";
if(item.user_id){
const { data } = await supabase.from("employees").select("name").eq("id",item.user_id).single();
if(data) name=data.name;
}

document.getElementById("modalContent").innerHTML=`
<h3>Detail</h3>
<p><b>Typ:</b> ${item.type}</p>
<p><b>Aktion:</b> ${item.action}</p>
<p><b>Mitarbeiter:</b> ${name}</p>
<p><b>Zeit:</b> ${new Date(item.created_at).toLocaleString()}</p>
<p>${item.details||""}</p>
`;

document.getElementById("modal").style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

document.getElementById("search").addEventListener("input",render);

load();
</script>

</body>
</html>
