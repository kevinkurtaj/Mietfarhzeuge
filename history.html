<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fahrzeughistorie</title>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f6f8;
    }

    header {
      background: white;
      padding: 20px;
      border-bottom: 1px solid #ddd;
    }

    main {
      padding: 20px;
      max-width: 1000px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 10px;
      border: 1px solid #ddd;
    }

    .loading {
      color: #555;
    }
  </style>
</head>

<body>

<header>
  <a href="index.html">← Zurück</a>
  <h2 id="title">Historie wird geladen...</h2>
</header>

<main>
  <div id="historyApp" class="loading">Lade Daten...</div>
</main>

<script>
  // ✅ DEINE DATEN
  const SUPABASE_URL = "https://iufkwovepjljycdulnwa.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1Zmt3b3ZlcGpsanljZHVsbndhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Mjc5MDQsImV4cCI6MjA5MjUwMzkwNH0.LucPsaYa2iNOzQmbn-7ECNxi-ATEj3_mrHvJfEvDfmY";

  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const params = new URLSearchParams(window.location.search);
  const vehicleId = params.get("id");

  const historyApp = document.getElementById("historyApp");
  const title = document.getElementById("title");

  async function loadHistory() {
    if (!vehicleId) {
      historyApp.innerHTML = "Keine Fahrzeug-ID";
      return;
    }

    title.textContent = "Fahrzeug Historie";

    const { data, error } = await supabaseClient
      .from("vehicle_history")
      .select("*")
      .eq("vehicle_id", vehicleId)
      .order("created_at", { ascending: false });

    if (error) {
      historyApp.innerHTML = "Fehler: " + error.message;
      return;
    }

    if (!data.length) {
      historyApp.innerHTML = "Keine Historie vorhanden";
      return;
    }

    historyApp.innerHTML = data.map(item => `
      <div class="card">
        <strong>${item.action}</strong><br>
        ${new Date(item.created_at).toLocaleString()}<br>
        ${item.details || ""}
      </div>
    `).join("");
  }

  loadHistory();
</script>

</body>
</html>
