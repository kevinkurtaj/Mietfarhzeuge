<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fahrzeughistorie</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f6f8;
    }

    header {
      background: white;
      padding: 20px;
      border-bottom: 1px solid #e5e7eb;
    }

    main {
      padding: 24px;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 14px;
      border-radius: 14px;
      margin-bottom: 10px;
      border: 1px solid #e5e7eb;
      transition: 0.15s;
    }

    .card:hover {
      background: #f9fafb;
    }

    .tag {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .vehicle {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .damage {
      background: #fee2e2;
      color: #991b1b;
    }

    .success {
      background: #dcfce7;
      color: #166534;
    }

    .time {
      font-size: 12px;
      color: #6b7280;
    }

    .details {
      margin-top: 4px;
      color: #374151;
    }

    .loading {
      color: #555;
    }
  </style>
</head>

<body>

<header>
  <a href="index.html">← Zurück</a>
  <h2 id="title">Historie wird geladen...</h2>
</header>

<main>
  <div id="historyApp" class="loading">Lade Daten...</div>
</main>

<script>
  const SUPABASE_URL = "https://iufkwovepjljycdulnwa.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1Zmt3b3ZlcGpsanljZHVsbndhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Mjc5MDQsImV4cCI6MjA5MjUwMzkwNH0.LucPsaYa2iNOzQmbn-7ECNxi-ATEj3_mrHvJfEvDfmY";

  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const params = new URLSearchParams(window.location.search);
  const vehicleId = params.get("id");

  const historyApp = document.getElementById("historyApp");
  const title = document.getElementById("title");

  async function loadHistory() {
    if (!vehicleId) {
      historyApp.innerHTML = "Keine Fahrzeug-ID";
      return;
    }

    title.textContent = "Fahrzeug Historie";

    // Fahrzeugstatus
    const { data: vehicleHistory } = await supabaseClient
      .from("vehicle_history")
      .select("*")
      .eq("vehicle_id", vehicleId);

    // Schäden holen
    const { data: damages } = await supabaseClient
      .from("damages")
      .select("id")
      .eq("vehicle_id", vehicleId);

    const damageIds = (damages || []).map(d => d.id);

    let damageHistory = [];

    if (damageIds.length > 0) {
      const res = await supabaseClient
        .from("damage_history")
        .select("*")
        .in("damage_id", damageIds);

      damageHistory = res.data || [];
    }

    const combined = [
      ...(vehicleHistory || []).map(item => ({ ...item, type: "vehicle" })),
      ...(damageHistory || []).map(item => ({ ...item, type: "damage" }))
    ];

    combined.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

    if (!combined.length) {
      historyApp.innerHTML = "Keine Historie vorhanden";
      return;
    }

    historyApp.innerHTML = combined.map(item => {
      let tagClass = "vehicle";
      let label = "🚗 Fahrzeug";

      if (item.type === "damage") {
        label = "⚠️ Schaden";
        tagClass = "damage";

        if (item.action === "repariert") tagClass = "success";
      }

      return `
        <div class="card">
          <div class="tag ${tagClass}">
            ${label} • ${item.action}
          </div>

          <div class="time">
            ${new Date(item.created_at).toLocaleString()}
          </div>

          <div class="details">
            ${item.details || ""}
          </div>
        </div>
      `;
    }).join("");
  }

  loadHistory();
</script>

</body>
</html>
